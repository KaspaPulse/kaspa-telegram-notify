[licenses]
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "Unlicense",
    "BSD-3-Clause", "BSD-2-Clause", "0BSD", "ISC", "CC0-1.0",
    "OpenSSL", "Unicode-DFS-2016", "Unicode-3.0", "Zlib", "MPL-2.0",
    "LGPL-3.0-only", "CDLA-Permissive-2.0"
]

[bans]
multiple-versions = "allow"

[advisories]
ignore = [
    "RUSTSEC-2023-0071", # SQLx compile-time macro vulnerability
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained warning
    "RUSTSEC-2023-0044", # RSA timing side-channel (Kaspa crypto)
    "RUSTSEC-2023-0072", # Ed25519 fallback warning (Kaspa crypto)
    "RUSTSEC-2024-0370", # General cryptography advisory
    "RUSTSEC-2024-0019", # Sub-dependency vulnerability
    "RUSTSEC-2024-0332", # Ring/Webpki vulnerabilities found in some RPC clients
    "RUSTSEC-2021-0145"  # Ancient vulnerability buried in Kaspa core
]

[sources]
unknown-registry = "warn"
allow-git = [
    "https://github.com/kaspanet/rusty-kaspa",
    "https://github.com/RustSec/advisory-db"
]