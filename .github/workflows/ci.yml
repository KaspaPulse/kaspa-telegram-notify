name: Kaspa Solo Enterprise CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  # Crucial for allowing tokio-console permissions during automated builds
  RUSTFLAGS: "--cfg tokio_unstable"

jobs:
  security-audit:
    name: Security Audit (cargo audit)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: 🛡️ Audit Dependencies for Vulnerabilities
        # uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  lint-and-build:
    name: Code Quality & Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install Ubuntu System Dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: 🦀 Install Rust Toolchain (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: ⚡ Smart Rust Cache Manager
        uses: Swatinem/rust-cache@v2

      - name: 🧹 Check Formatting (cargo fmt)
        run: cargo fmt --all -- --check

      - name: 🚨 Strict Clippy Linting (Zero-Warning Policy)
        run: cargo clippy --release -- -D warnings

      - name: 🏗️ Build Enterprise Release (cargo build)
        run: cargo build --release
