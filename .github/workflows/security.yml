name: Deep Security Audit 🛡️

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  security_audit:
    name: Dependency Vulnerability & Supply Chain Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Modern Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Security Tools (Ultra-Fast Pre-built)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Run Deep Security Scan (Audit)
        run: cargo audit
        
      - name: Run Supply Chain Ban/License Check (Deny)
        run: cargo deny check

